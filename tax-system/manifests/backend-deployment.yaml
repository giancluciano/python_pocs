apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tax-system
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: migrate
          image: tax-backend:latest
          imagePullPolicy: Never
          command:
            - python
            - manage.py
            - migrate
            - --noinput
          envFrom:
            - secretRef:
                name: postgres-secret
            - configMapRef:
                name: backend-config
      containers:
        - name: backend
          image: tax-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: postgres-secret
            - configMapRef:
                name: backend-config
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
